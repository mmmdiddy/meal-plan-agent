<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ Meal Plan Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --tomato: #FF4136;
    --sunshine: #FFD700;
    --avocado: #3D9970;
    --blueberry: #4A90D9;
    --cream: #FFFDF5;
    --ink: #1a1a1a;
    --card-shadow: 4px 4px 0px var(--ink);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    background-image: radial-gradient(circle, #e0d9c8 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: var(--tomato);
    border-bottom: 3px solid var(--ink);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-family: 'Abril Fatface', serif;
    font-size: 2.2rem;
    color: var(--cream);
    letter-spacing: 1px;
  }

  header span { font-size: 2.2rem; }

  .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  /* PREFERENCES FORM */
  .pref-card {
    background: var(--sunshine);
    border: 3px solid var(--ink);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    padding: 32px;
    margin-bottom: 40px;
  }

  .pref-card h2 {
    font-family: 'Abril Fatface', serif;
    font-size: 1.6rem;
    margin-bottom: 24px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .form-group label {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 2.5px solid var(--ink);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    background: white;
    outline: none;
    transition: box-shadow 0.2s;
  }

  .form-group input:focus {
    box-shadow: 3px 3px 0 var(--ink);
  }

  .saved-banner {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-generate {
    background: var(--tomato);
    color: white;
    border: 3px solid var(--ink);
    border-radius: 12px;
    padding: 14px 36px;
    font-family: 'Abril Fatface', serif;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-generate:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
  }

  .btn-generate:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .btn-generate:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: var(--card-shadow);
  }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 60px;
  }

  .loading.active { display: block; }

  .loading-emoji {
    font-size: 3rem;
    animation: bounce 0.8s infinite alternate;
    display: inline-block;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-16px); }
  }

  .loading p {
    font-family: 'Abril Fatface', serif;
    font-size: 1.4rem;
    margin-top: 16px;
    color: var(--tomato);
  }

  .loading small {
    color: #666;
    font-size: 0.9rem;
  }

  /* RESULTS */
  .results { display: none; }
  .results.active { display: block; }

  .section-title {
    font-family: 'Abril Fatface', serif;
    font-size: 1.8rem;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* MEAL PLAN CALENDAR */
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
    margin-bottom: 48px;
  }

  .day-card {
    background: white;
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 3px 3px 0 var(--ink);
  }

  .day-header {
    padding: 10px;
    text-align: center;
    font-family: 'Abril Fatface', serif;
    font-size: 1rem;
    border-bottom: 2px solid var(--ink);
  }

  .day-card:nth-child(1) .day-header { background: #FF6B6B; color: white; }
  .day-card:nth-child(2) .day-header { background: #FF9F43; color: white; }
  .day-card:nth-child(3) .day-header { background: #F7DC6F; color: var(--ink); }
  .day-card:nth-child(4) .day-header { background: #6BCB77; color: white; }
  .day-card:nth-child(5) .day-header { background: #4A90D9; color: white; }
  .day-card:nth-child(6) .day-header { background: #9B59B6; color: white; }
  .day-card:nth-child(7) .day-header { background: #E74C3C; color: white; }

  .meal-slot {
    padding: 10px;
    border-bottom: 1px solid #eee;
    font-size: 0.78rem;
  }

  .meal-slot:last-child { border-bottom: none; }

  .meal-slot .meal-type {
    font-weight: 600;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin-bottom: 3px;
  }

  .meal-slot .meal-name { line-height: 1.3; }

  /* RECIPE CARDS */
  .recipes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 48px;
  }

  .recipe-card {
    background: white;
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    box-shadow: 3px 3px 0 var(--ink);
    overflow: hidden;
  }

  .recipe-header {
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
    transition: background 0.2s;
  }

  .recipe-header:hover { background: #f9f5ee; }

  .recipe-header-left .meal-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
  }

  .recipe-header-left .recipe-name {
    font-family: 'Abril Fatface', serif;
    font-size: 1rem;
    line-height: 1.3;
  }

  .recipe-calories {
    background: var(--sunshine);
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .recipe-chevron {
    margin-left: 10px;
    font-size: 1rem;
    transition: transform 0.2s;
  }

  .recipe-card.open .recipe-chevron { transform: rotate(180deg); }

  .recipe-body {
    display: none;
    padding: 0 20px 20px;
    border-top: 2px solid #eee;
  }

  .recipe-card.open .recipe-body { display: block; }

  .recipe-body h4 {
    font-weight: 600;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
    color: var(--tomato);
  }

  .recipe-body ul { padding-left: 18px; }
  .recipe-body ul li { margin-bottom: 4px; font-size: 0.9rem; }
  .recipe-body ol { padding-left: 18px; }
  .recipe-body ol li { margin-bottom: 6px; font-size: 0.9rem; line-height: 1.5; }

  /* SHOPPING LIST */
  .shopping-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .shop-category {
    background: white;
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    box-shadow: 3px 3px 0 var(--ink);
    overflow: hidden;
  }

  .shop-cat-header {
    padding: 12px 16px;
    font-family: 'Abril Fatface', serif;
    font-size: 1rem;
    border-bottom: 2px solid var(--ink);
  }

  .shop-category:nth-child(1) .shop-cat-header { background: #FFB3B3; }
  .shop-category:nth-child(2) .shop-cat-header { background: #B3E5FC; }
  .shop-category:nth-child(3) .shop-cat-header { background: #C8E6C9; }
  .shop-category:nth-child(4) .shop-cat-header { background: #FFF9C4; }
  .shop-category:nth-child(5) .shop-cat-header { background: #F8BBD0; }
  .shop-category:nth-child(6) .shop-cat-header { background: #D1C4E9; }
  .shop-category:nth-child(7) .shop-cat-header { background: #FFE0B2; }

  .shop-items { padding: 12px 16px; }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
  }

  .shop-item:last-child { border-bottom: none; }

  .shop-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--avocado);
    cursor: pointer;
    flex-shrink: 0;
  }

  .shop-item label {
    font-size: 0.9rem;
    cursor: pointer;
    transition: color 0.2s, text-decoration 0.2s;
  }

  .shop-item.checked label {
    text-decoration: line-through;
    color: #aaa;
  }

  @media (max-width: 768px) {
    .calendar { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <span>🍽️</span>
  <h1>Meal Plan Agent</h1>
</header>

<div class="container">

  <!-- PREFERENCES FORM -->
  <div class="pref-card">
    <h2>✏️ Your Preferences</h2>

    {% if saved %}
    <div class="saved-banner">
      💾 <strong>Saved preferences loaded!</strong> Edit below or generate right away.
    </div>
    {% endif %}

    <div class="form-grid">
      <div class="form-group">
        <label>Dietary Restrictions</label>
        <input type="text" id="diet" placeholder="e.g. vegetarian, vegan..." value="{{ saved.diet if saved else '' }}">
      </div>
      <div class="form-group">
        <label>Allergies</label>
        <input type="text" id="allergies" placeholder="e.g. nuts, dairy..." value="{{ saved.allergies if saved else '' }}">
      </div>
      <div class="form-group">
        <label>Favorite Cuisines</label>
        <input type="text" id="cuisine" placeholder="e.g. Italian, Mexican..." value="{{ saved.cuisine if saved else '' }}">
      </div>
      <div class="form-group">
        <label>Daily Calorie Goal</label>
        <input type="text" id="calories" placeholder="e.g. 2000" value="{{ saved.calories if saved else '' }}">
      </div>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generate()">
      <span>🚀</span> Generate My Meal Plan
    </button>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="loading-emoji">🍳</div>
    <p>Your agent is cooking...</p>
    <small>Planning meals, fetching recipes & building your shopping list. This takes ~1–2 minutes.</small>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results">

    <!-- MEAL PLAN CALENDAR -->
    <div class="section-title">📅 Your Week</div>
    <div class="calendar" id="calendar"></div>

    <!-- RECIPES -->
    <div class="section-title">📖 Recipes</div>
    <div class="recipes-grid" id="recipesGrid"></div>

    <!-- SHOPPING LIST -->
    <div class="section-title">🛒 Shopping List</div>
    <div class="shopping-grid" id="shoppingGrid"></div>

  </div>
</div>

<script>
  const DAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  const MEALS = ['breakfast','lunch','dinner'];
  const MEAL_EMOJI = { breakfast: '🌅', lunch: '☀️', dinner: '🌙' };
  const CAT_EMOJI = { produce: '🥦', dairy: '🧀', pantry: '🥫', grains: '🌾', protein: '🥩', spices: '🌶️', other: '🛍️' };

  async function generate() {
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    document.getElementById('loading').classList.add('active');
    document.getElementById('results').classList.remove('active');

    const payload = {
      diet: document.getElementById('diet').value,
      allergies: document.getElementById('allergies').value,
      cuisine: document.getElementById('cuisine').value,
      calories: document.getElementById('calories').value,
    };

    try {
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (!data.success) throw new Error(data.error);

      renderCalendar(data.meal_plan);
      renderRecipes(data.recipes);
      renderShopping(data.shopping_list);

      document.getElementById('loading').classList.remove('active');
      document.getElementById('results').classList.add('active');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    } catch (e) {
      document.getElementById('loading').classList.remove('active');
      alert('Something went wrong: ' + e.message);
    }

    btn.disabled = false;
  }

  function renderCalendar(mealPlan) {
    const cal = document.getElementById('calendar');
    cal.innerHTML = '';
    DAYS.forEach(day => {
      const meals = mealPlan[day];
      cal.innerHTML += `
        <div class="day-card">
          <div class="day-header">${day.slice(0,3).toUpperCase()}</div>
          ${MEALS.map(m => `
            <div class="meal-slot">
              <div class="meal-type">${MEAL_EMOJI[m]} ${m}</div>
              <div class="meal-name">${meals[m]}</div>
            </div>
          `).join('')}
        </div>
      `;
    });
  }

  function renderRecipes(recipes) {
    const grid = document.getElementById('recipesGrid');
    grid.innerHTML = '';
    DAYS.forEach(day => {
      MEALS.forEach(mealType => {
        const details = recipes[day][mealType];
        const id = `${day}-${mealType}`;
        grid.innerHTML += `
          <div class="recipe-card" id="${id}">
            <div class="recipe-header" onclick="toggleRecipe('${id}')">
              <div class="recipe-header-left">
                <div class="meal-label">${day} · ${mealType}</div>
                <div class="recipe-name">${details.name}</div>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <span class="recipe-calories">🔥 ${details.recipe.calories} kcal</span>
                <span class="recipe-chevron">▼</span>
              </div>
            </div>
            <div class="recipe-body">
              <h4>Ingredients</h4>
              <ul>${details.recipe.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
              <h4>Instructions</h4>
              <ol>${details.recipe.instructions.map(s => `<li>${s}</li>`).join('')}</ol>
            </div>
          </div>
        `;
      });
    });
  }

  function toggleRecipe(id) {
    document.getElementById(id).classList.toggle('open');
  }

  function renderShopping(list) {
    const grid = document.getElementById('shoppingGrid');
    grid.innerHTML = '';
    Object.entries(list).forEach(([cat, items]) => {
      if (!items || items.length === 0) return;
      const catId = `cat-${cat}`;
      grid.innerHTML += `
        <div class="shop-category">
          <div class="shop-cat-header">${CAT_EMOJI[cat] || '🛍️'} ${cat.charAt(0).toUpperCase() + cat.slice(1)}</div>
          <div class="shop-items">
            ${items.map((item, i) => `
              <div class="shop-item" id="${catId}-${i}">
                <input type="checkbox" id="chk-${catId}-${i}" onchange="toggleCheck('${catId}-${i}')">
                <label for="chk-${catId}-${i}">${item}</label>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    });
  }

  function toggleCheck(id) {
    document.getElementById(id).classList.toggle('checked');
  }
</script>
</body>
</html>
